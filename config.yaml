# =====================================================================
# config.yaml — Event segmentation sliding-window pipeline
# Pipeline order: s1 harmonization -> s2 sliding_window -> s3 preprocessing -> s4 validation
# Load in each R script with: cfg <- yaml::read_yaml("config.yaml")
# =====================================================================

paths:
  # --- Raw inputs (Stage 1) — default to toy dirs ---#
  confound_dir:   "Toy_data_directory/Confounds_data"
  behavioral_dir: "Toy_data_directory/Behavioral_data"
  phenotype_file: "Toy_data_directory/Phenotype_data/HBN_complete_Pheno.csv"
 
  # --- Raw neural input (Stage 3) — default to toy dir ---#
  neural_file_partial: "Toy_data_directory/Neural_data/MASTER_partial_allrois_boundaries_stacked.tsv"
  neural_file_full:    "Toy_data_directory/Neural_data/MASTER_allSubjects_allrois_boundaries_stacked.tsv"
  #when adapting for a real run use these
  #neural_file_partial:       /data/neural/MASTER_allSubjects_allrois_boundaries_stacked_test.tsv
  #neural_file_full:  /data/neural/MASTER_allSubjects_allrois_boundaries_stacked_full_test.tsv
 
  # --- Stage outputs ---
  output_dir_s1:  "data/harmonization_output"
  output_dir_s2:  "data/sliding_window_output"
  output_dir_s3:  "data/final_harmonization_output"
  output_dir_s4:  "data/validation_analysis_output"
 
# --- Toy Data Generation ---#
toy_data:
  desired_beh_participants:    10
  desired_neural_participants: 20

# --- Stage 1: data loading & harmonization ---#
harmonization:
  TR_max:        750
  hrf_shift_tr:  7
  n_dummy_tr:    40
  n_trs_stim:    751
  smooth_window: 6
 
# --- Stage 2: sliding window motion selection ---#
sliding_window:
  fd_threshold:       0.25
  dvars_threshold:    1.5
  win_length:         225
  max_window_number:  1
  adult_age_min:      16
  age_col:            "Age"
  win_length_full:    355
  max_w_num_full:     1

# --- Stage 2.20: Bold crop (for GSBS based on extracted windows) ---#
bold_crop:
  regressed_dir: "data/neural_test_data"
  cropped_dir:   "data/cropped_partial_window"
  bold_suffix:   "_task-movieDM_space-MNI152NLin2009cAsym_desc-preproc_cropped_bold.nii.gz"
  output_suffix: "_task-movieDM_space-MNI152NLin2009cAsym_desc-preproc_partial_window_bold.nii.gz"

# --- Container for Apptainer run --- #
container:   
  python_exec: "python3"

# --- Stage 2.40-2.60: GSBS (event segmentation on full and cropped BOLD) ---#
gsbs:
  # 2.40: GSBS on the full neural data
  input_dir_full:   "data/neural_test_data"
  input_suffix_full: "_task-movieDM_space-MNI152NLin2009cAsym_desc-preproc_cropped_bold.nii.gz"
  output_dir_full:  "data/gsbs_output/neural_test_data"
  kmax_full:           140

  # 2.60: GSBS on the cropped partial-window data (bold_crop output)
  input_dir_partial:   "data/cropped_partial_window"
  input_suffix_partial: "_task-movieDM_space-MNI152NLin2009cAsym_desc-preproc_partial_window_bold.nii.gz"
  output_dir_partial:  "data/gsbs_output/cropped_partial_window"
  kmax_partial:           89

  # Shared inputs / hyperparameters
  atlas_nifti:    "data/atlases/Schaefer2018_100Parcels_7Networks_movieDM_resamp_2p4mm_cropped.nii.gz"
  dmin:           1
  blocksize:      25
  finetune:       1
  cores_per_subject: 4
  statewise_detection: 'true'
  finetune_order_weakest_first: 'true'
   
# --- Stage 3: preprocessing for final analysis ---#
preprocessing:
  neural_tr_offset: 1
  smooth_window:    6
 
# --- Stage 4: individualized validation ---#
validation:
  high_motion_tr_threshold: 0.2
  fdr_method:               "BH"
  fdr_alpha:                0.05
